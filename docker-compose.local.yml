version: '3.8'

# ─── Aivory Platform — Local Development Stack ──────────────────────────────
# For local verification only. No Traefik, no TLS. Direct port access.
#
# Usage:
#   docker network create aivory-network
#   docker compose -f docker-compose.local.yml up -d --build
#
# Access:
#   Website:          http://localhost:9000
#   User Dashboard:   http://localhost:9001
#   Admin Dashboard:  http://localhost:9002
#   AI Console:       http://localhost:8086
#   AI Gateway:       http://localhost:8090
#   n8n Editor:       http://localhost:5678
#   Backend API:      http://localhost:8081
#   Diagnostics:      http://localhost:8082
#   Blueprint:        http://localhost:8083
#   Roadmaps:         http://localhost:8084
#   Payments:         http://localhost:8085
#   Workflows:        http://localhost:8087
#   Blog:             http://localhost:8088
#   Careers:          http://localhost:8089
# ─────────────────────────────────────────────────────────────────────────────

x-python-defaults: &python-defaults
  restart: unless-stopped
  networks:
    - aivory-network

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  avry-n8n:
    image: n8nio/n8n:latest
    container_name: avry-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin@aivory.local}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-Aivory2026!}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=child_process
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - aivory-network

  avry-n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: avry-n8n-mcp
    environment:
      - MCP_MODE=http
      - PORT=3020
      - LOG_LEVEL=error
      - DISABLE_CONSOLE_OUTPUT=true
      - N8N_API_URL=http://avry-n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - AUTH_TOKEN=${N8N_MCP_AUTH_TOKEN:-aivory-mcp-token-2026}
      - WEBHOOK_SECURITY_MODE=moderate
      - N8N_MCP_TELEMETRY_DISABLED=true
    depends_on:
      avry-n8n:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3020/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - aivory-network

  avry-n8n-as-code:
    build:
      context: services/avry-n8n/n8n-as-code-service
      dockerfile: Dockerfile
    container_name: avry-n8n-as-code
    environment:
      - N8N_HOST=http://avry-n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_ADMIN_EMAIL=${N8N_BASIC_AUTH_USER:-admin@aivory.local}
      - N8N_ADMIN_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-Aivory2026!}
      - WORKFLOW_STORE=/app/workflows-store
      - ZEROCLAW_URL=http://avry-zeroclaw-daemon:3010
    volumes:
      - n8n_as_code_drafts:/app/workflows-store/drafts
    depends_on:
      avry-n8n:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3500/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - aivory-network

  avry-zeroclaw-daemon:
    build:
      context: services/avry-zeroclaw
      dockerfile: Dockerfile.zeroclaw
    container_name: avry-zeroclaw-daemon
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./services/avry-zeroclaw/config:/home/zeroclaw/.zeroclaw
      - ./services/avry-zeroclaw/runtime:/home/zeroclaw/workspace
      - ./services/avry-zeroclaw/skills:/home/zeroclaw/skills
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - aivory-network

  avry-zeroclaw:
    build:
      context: services/avry-zeroclaw/vps-bridge
      dockerfile: Dockerfile
    container_name: avry-zeroclaw
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - ZEROCLAW_URL=http://avry-zeroclaw-daemon:3010
      - ZEROCLAW_BASE_URL=http://avry-zeroclaw-daemon:3010
      - N8N_BASE_URL=http://avry-n8n:5678
      - N8N_AS_CODE_URL=http://avry-n8n-as-code:3500
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-aivory-internal-2026}
      - CORS_ORIGIN=http://localhost:9000,http://localhost:9001,http://localhost:9002,http://localhost:8086
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - N8N_API_KEY_1=${N8N_API_KEY}
      - N8N_API_KEY_2=${N8N_API_KEY}
      - N8N_API_KEY_3=${N8N_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - DIAGNOSTIC_MODEL=${DIAGNOSTIC_MODEL:-qwen/qwen3-235b-a22b}
      - AUTH_BACKEND_URL=http://avry-backend:8081
    depends_on:
      avry-zeroclaw-daemon:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - aivory-network

  # ── Backend ────────────────────────────────────────────────────────────────

  avry-backend:
    build:
      context: backend/avry-backend
      dockerfile: Dockerfile
    container_name: avry-backend
    <<: *python-defaults
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  avry-diagnostics:
    build:
      context: services/avry-diagnostics
      dockerfile: Dockerfile
    container_name: avry-diagnostics
    <<: *python-defaults
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  avry-blueprint:
    build:
      context: services/avry-blueprint
      dockerfile: Dockerfile
    container_name: avry-blueprint
    <<: *python-defaults
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  avry-roadmaps:
    build:
      context: services/avry-roadmap
      dockerfile: Dockerfile
    container_name: avry-roadmaps
    <<: *python-defaults
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  avry-payments:
    build:
      context: services/avry-payments
      dockerfile: Dockerfile
    container_name: avry-payments
    <<: *python-defaults
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  avry-console:
    build:
      context: services/avry-console
      dockerfile: Dockerfile
    container_name: avry-console
    <<: *python-defaults
    ports:
      - "8086:8086"
    environment:
      - NODE_ENV=development
      - PORT=8086
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - VPS_BRIDGE_URL=http://avry-zeroclaw:8090
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  avry-workflows:
    build:
      context: services/avry-workflows
      dockerfile: Dockerfile
    container_name: avry-workflows
    <<: *python-defaults
    ports:
      - "8087:8087"
    environment:
      - PORT=8087
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - N8N_AS_CODE_URL=http://avry-n8n-as-code:3500
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  avry-blog:
    build:
      context: services/avry-blog
      dockerfile: Dockerfile
    container_name: avry-blog
    <<: *python-defaults
    ports:
      - "8088:8088"
    environment:
      - PORT=8088
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  avry-careers:
    build:
      context: services/avry-careers
      dockerfile: Dockerfile
    container_name: avry-careers
    <<: *python-defaults
    ports:
      - "8089:8089"
    environment:
      - PORT=8089
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-careers@aivory.id}
    volumes:
      - careers_cv_data:/app/data/cvs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend ───────────────────────────────────────────────────────────────

  avry-website:
    build:
      context: frontend/frontend-nextjs
      dockerfile: Dockerfile
    container_name: avry-website
    <<: *python-defaults
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=development
      - PORT=9000
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  avry-user-dashboard:
    build:
      context: frontend/avry-user-dashboard
      dockerfile: Dockerfile
    container_name: avry-user-dashboard
    <<: *python-defaults
    ports:
      - "9001:9001"
    environment:
      - NODE_ENV=development
      - PORT=9001
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - NEXT_PUBLIC_ZEROCLAW_URL=http://localhost:8090
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  avry-admin-dashboards:
    build:
      context: frontend/avry-admin-dashboard
      dockerfile: Dockerfile
    container_name: avry-admin-dashboards
    <<: *python-defaults
    ports:
      - "9002:9002"
    environment:
      - NODE_ENV=development
      - PORT=9002
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  n8n_data:
  n8n_as_code_drafts:
  careers_cv_data:

networks:
  aivory-network:
    name: aivory-network
    external: true
